<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Control de Activos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Header mínimo -->
    <header class="bg-primary text-white py-3">
        <div class="container d-flex align-items-center gap-3">
            <img src="/img/logo.png" alt="Logo" height="40" onerror="this.style.display='none'">
            <h1 class="h5 mb-0">Control de Activos</h1>
        </div>
    </header>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center text-primary mb-4">Iniciar Sesión</h2>
                        <form>
                            <div class="mb-3">
                                <label for="rut" class="form-label">RUT</label>
                                <input type="text" id="rut" class="form-control" placeholder="Ingrese su RUT" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                        </form>
                        <div id="mensaje-login" class="mt-3"></div>
                    </div>
                </div>
                <p class="text-center mt-3 text-muted">
                    <a href="/">← Volver al inicio</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">© 2025 Centro Educacional Matías Cousiño</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
